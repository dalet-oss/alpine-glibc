name: 'Compile glibc'

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - .github/workflows/compile-glibc.yml
      - glibc-versions.yml # Input - and partial output! - of this workflow

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: false


jobs:

  discover-versions:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.discover-versions.outputs.versions }}
    steps:
      - uses: actions/checkout@v4

      - id: discover-versions
        name: Discover versions
        run: |
          VERSIONS=$(cat glibc-versions.yml | yq '.versions[].glibcVersion')
          echo versions=${VERSIONS} >> ${GITHUB_OUTPUT}


  find-first-uncompiled-version:
    needs: discover-versions
    runs-on: ubuntu-latest
    env:
      VERSIONS: ${{ needs.discover-versions.outputs.versions }}
    outputs:
      compile_required: ${{ steps.find.outputs.compile_required }}
      targetarch: ${{ steps.find.outputs.targetarch }}
      filename: ${{ steps.find.outputs.filename }}
    steps:
      - uses: actions/checkout@v4

      - id: find
        name: Find the first uncompiled version (if any exists)
        run: |
          for VERSION in ${VERSIONS[@]}; do
            AMD64_FILENAME="./glibc/glibc-bin-${VERSION}-x86_64.tar.gz"
            ARM64_FILENAME="./glibc/glibc-bin-${VERSION}-aarch64.tar.gz"
            if [ -f "${AMD64_FILENAME}" ] && [ -f "${ARM64_FILENAME}" ]; then
              echo "Version ${VERSION} already exists in ${AMD64_FILENAME} and ${ARM64_FILENAME}"
              continue
            fi
            if [ ! -f "${AMD64_FILENAME}" ]; then
              echo "Version ${VERSION} has not been compiled for amd64 yet"
              echo compile_required=${VERSION} >> ${GITHUB_OUTPUT}
              echo filename=${AMD64_FILENAME} >> ${GITHUB_OUTPUT}
              echo targetarch=amd64 >> ${GITHUB_OUTPUT}
            else
              echo "Version ${VERSION} has not been compiled for arm64 yet"
              echo compile_required=${VERSION} >> ${GITHUB_OUTPUT}
              echo filename=${ARM64_FILENAME} >> ${GITHUB_OUTPUT}
              echo targetarch=arm64 >> ${GITHUB_OUTPUT}
              break
            fi
          done


  compile-glibc:
    needs: find-first-uncompiled-version
    if: needs.find-first-uncompiled-version.outputs.compile_required != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      VERSION: ${{ needs.find-first-uncompiled-version.outputs.compile_required }}
      FILENAME: ${{ needs.find-first-uncompiled-version.outputs.filename }}
      TARGETARCH: ${{ needs.find-first-uncompiled-version.outputs.targetarch }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Ensure output directory is present
        run: |
          mkdir -p glibc

      # TODO remove this step (see below)
      - name: Check out docker-glibc-builder
        uses: actions/checkout@v4
        with:
          repository: sgerrand/docker-glibc-builder
          path: .glibc-builder

      - name: Set up QEMU
        if: needs.find-first-uncompiled-version.outputs.targetarch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # TODO: Hopefully https://github.com/sgerrand/docker-glibc-builder/issues/65 will be addressed, allowing the
      #       whole of this step and the one above which checks out this repo to be removed, and the subsequent step
      #       updated to use the public `sgerrand/glibc-builder` Docker image from
      #       https://hub.docker.com/r/sgerrand/glibc-builder.
      - name: Create up-to-date docker-image for docker-glibc-builder, on ${{ env.TARGETARCH }}; remove source directory
        run: |
          cd .glibc-builder
          docker build --platform linux/${TARGETARCH} -t latest-glibc-builder-${TARGETARCH} .
          cd ..
          rm -rf .glibc-builder

      - name: Compile glibc for ${{ env.TARGETARCH }}
        # TODO use `sgerrand/glibc-builder` (see above)
        run: |
          docker run --rm --env STDOUT=1 latest-glibc-builder-${TARGETARCH} ${VERSION} /usr/glibc-compat > ${FILENAME}

      - name: Show output arm64 file, determine checksum; update checksum in glibc-versions.yml; git add
        run: |
          ls -l ${FILENAME}
          SHA512=$(sha512sum ${FILENAME} | awk '{ print $1 }')
          echo "sha512sum for ${FILENAME} is ${SHA512}"
          yq e '(.versions[] | select(.glibcVersion == "'"$VERSION"'") | .${{ env.TARGETARCH }}sha512sum) = "'"$SHA512"'"' -i glibc-versions.yml
          git add ${FILENAME} glibc-versions.yml
          git status
          git diff --cached

      - name: Submit new glibc tarball & its checksum via PR
        uses: peter-evans/create-pull-request@v8
        with:
          title: "Add ${{ env.TARGETARCH }} glibc bin for ${{ env.VERSION }}, compiled by Github Actions"
          branch: "autogenerated-${{ env.TARGETARCH }}glibc-bin-${{ env.VERSION }}"
          body: |
            Automated PR to add the binary ${{ env.TARGETARCH }} artifact(s) for glibc version ${{ env.VERSION }}.
          labels: automated
          commit-message: "Add ${{ env.TARGETARCH }} glibc bin for ${{ env.VERSION }}, compiled by Github Actions"


  verify-all-glibc-checksums:
    needs:
      - discover-versions
      - find-first-uncompiled-version
    if: needs.find-first-uncompiled-version.outputs.compile_required == ''
    runs-on: ubuntu-latest
    env:
      VERSIONS: ${{ needs.discover-versions.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify all glibc checksums
        run: |
          for VERSION in ${VERSIONS[@]}; do
            AMD64_FILENAME="./glibc/glibc-bin-${VERSION}-x86_64.tar.gz"
            ARM64_FILENAME="./glibc/glibc-bin-${VERSION}-aarch64.tar.gz"
            AMD64_SHA512=$(cat glibc-versions.yml | yq '(.versions[] | select(.glibcVersion == "'"${VERSION}"'") | .amd64sha512sum)')
            ARM64_SHA512=$(cat glibc-versions.yml | yq '(.versions[] | select(.glibcVersion == "'"${VERSION}"'") | .arm64sha512sum)')
            if [ -f "${AMD64_FILENAME}" ]; then
              echo "Version ${VERSION} exists in ${AMD64_FILENAME}; validating checksum '${AMD64_SHA512}'..."
              echo "${AMD64_SHA512}  ${AMD64_FILENAME}" | sha512sum --check
            else
              echo "Version ${VERSION} is missing file ${AMD64_FILENAME} - this is unexpected" && false
            fi
            if [ -f "${ARM64_FILENAME}" ]; then
              echo "Version ${VERSION} exists in ${ARM64_FILENAME}; validating checksum '${ARM64_SHA512}'..."
              echo "${ARM64_SHA512}  ${ARM64_FILENAME}" | sha512sum --check
            else
              echo "Version ${VERSION} is missing file ${ARM64_FILENAME}  - this is unexpected" && false
            fi
          done
